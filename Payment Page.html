<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: gold;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: gold;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
        }
        .account-info {
            background: gold;   
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }
        .account-info strong {
            color: gold;
        }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Make a Payment</h2>
      <label for="amount">Select Amount:</label>
      <select id="amount">
        <option value="">-- Choose an amount --</option>
        <option value="1000">₦1,000</option>
        <option value="2000">₦2,000</option>
        <option value="5000">₦5,000</option>
        <option value="10000">₦10,000</option>
        <option value="20000">₦20,000</option>
        <option value="30000">₦30,000</option>
        <option value="40000">₦40,000</option>
        <option value="50000">₦50,000</option>
      </select>
      <button onclick="showAccount()">Get Account Number</button>
      <div id="accountInfo" class="account-info">
        <p>Please make your payment to:</p>
        <p><strong>Bank Name:</strong> OPAY Bank</p>
        <p><strong>Account Number:</strong> 7052071781</p>
        <p><strong>Account Name:</strong> MULTI-INVESTMENT Business Ltd</p>
        <p><strong>Amount:</strong> <span id="selectedAmount"></span></p>
      </div>
    </div>
    <script>
function showAccount() {
    const amount = document.getElementById("amount").value;
    const accountDiv = document.getElementById("accountInfo");
    const amountSpan = document.getElementById("selectedAmount");

    if (!amount) {
        alert("Please select an amount first.");
        accountDiv.style.display = "none";
        return;
    }

    amountSpan.textContent = "₦" + parseInt(amount).toLocaleString();
    accountDiv.style.display = "block";
}
</script> <button> <a href="wallet.html" <="" button=""> </a></button>
  </body>
</html>
